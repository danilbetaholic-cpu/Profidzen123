<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Панель управления</title>
<style>
  :root { --bg:#07080c; --card:rgba(255,255,255,.05); --border:rgba(255,255,255,.1); --text:#f2f4f8; --muted:#9aa3b5; --accent:#4e7cff; --accent2:#9b5cff; --green:#34d399; --red:#f87171; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; min-height:100vh; }
  .wrap { max-width:880px; margin:0 auto; padding:40px 20px; }
  h1 { font-size:28px; letter-spacing:-.5px; }
  h1 span { background:linear-gradient(90deg,var(--accent),var(--accent2)); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .sub { color:var(--muted); margin-top:8px; font-size:15px; }
  .panel { background:var(--card); border:1px solid var(--border); border-radius:18px; padding:24px; margin-top:24px; }
  input, textarea {
    width:100%; padding:12px 14px; border-radius:10px; border:1px solid var(--border);
    background:rgba(255,255,255,.05); color:var(--text); font-size:15px; outline:none;
  }
  input:focus { border-color:var(--accent); }
  label { display:block; font-size:13px; color:var(--muted); margin:14px 0 6px; }
  .btn {
    padding:12px 22px; border-radius:12px; border:none; cursor:pointer; font-size:15px; font-weight:600;
    background:linear-gradient(90deg,var(--accent),var(--accent2)); color:#fff; transition:.25s;
  }
  .btn:hover { transform:translateY(-2px); }
  .btn-sec { background:rgba(255,255,255,.1); }
  .btn-danger { background:rgba(248,113,113,.15); color:var(--red); }
  .prod {
    display:grid; grid-template-columns:1fr 110px 110px 90px; gap:12px; align-items:end;
    padding:18px 0; border-bottom:1px solid var(--border);
  }
  .prod label { margin-top:0; }
  .toolbar { display:flex; gap:12px; flex-wrap:wrap; margin-top:24px; }
  .hidden { display:none; }
  .note { font-size:13px; color:var(--muted); line-height:1.6; margin-top:16px; }
  .toast {
    position:fixed; bottom:30px; left:50%; transform:translate(-50%,80px);
    background:#12141c; border:1px solid var(--border); border-radius:12px; padding:13px 22px;
    transition:transform .35s; z-index:100;
  }
  .toast.show { transform:translate(-50%,0); }
  @media (max-width:640px) {
    .prod { grid-template-columns:1fr 1fr; }
    .prod > div[style*="grid-column"] > div { grid-template-columns:1fr 1fr !important; }
    input, select { font-size:16px; } /* iPhone не зумит поля */
    .wrap { padding:24px 14px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>⚙️ Панель управления <span>TechPro</span></h1>
  <p class="sub">Управление товарами и ценами</p>

  <!-- Вход -->
  <div class="panel" id="loginPanel">
    <label>Пароль администратора</label>
    <input type="password" id="pwd" placeholder="Введите пароль" autocomplete="current-password" onkeydown="if(event.key==='Enter')login()">
    <div class="toolbar"><button class="btn" id="loginBtn" onclick="login()">Войти</button></div>
    <p class="note" id="loginNote"></p>
  </div>

  <!-- Редактор -->
  <div class="hidden" id="editor">
    <div class="panel">
      <div id="prodList"></div>
      <div class="toolbar">
        <button class="btn btn-sec" onclick="addProduct()">＋ Добавить товар</button>
      </div>
    </div>
    <div class="toolbar">
      <button class="btn" onclick="saveAll()">💾 Сохранить изменения</button>
      <button class="btn btn-sec" onclick="downloadJS()">⬇️ Скачать products.js</button>
      <button class="btn btn-sec" onclick="changePassword()">🔑 Сменить пароль</button>
      <button class="btn btn-danger" onclick="resetAll()">Сбросить к исходным</button>
    </div>
    <p class="note">
      <b>Сохранить изменения</b> — цены сразу обновятся на сайте (данные хранятся в этом браузере / на этом домене).<br>
      <b>Скачать products.js</b> — замените этим файлом старый на хостинге, чтобы изменения увидели все посетители навсегда.
    </p>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="products.js"></script>
<script>
let products = [];

// ---------- вход по SHA-256 хешу + защита от перебора ----------
async function sha256(str) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
  return [...new Uint8Array(buf)].map(b => b.toString(16).padStart(2, "0")).join("");
}
function lockState() {
  try { return JSON.parse(localStorage.getItem("adm_lock") || "{}"); } catch(e){ return {}; }
}
function setLock(s) { localStorage.setItem("adm_lock", JSON.stringify(s)); }

async function login() {
  const st = lockState();
  // после 5 неудач — блокировка на 5 минут
  if (st.until && Date.now() < st.until) {
    const min = Math.ceil((st.until - Date.now()) / 60000);
    toast("Слишком много попыток. Подождите " + min + " мин.");
    return;
  }
  const pwd = document.getElementById("pwd").value;
  const hash = await sha256(pwd);
  if (hash === window.SHOP_CONFIG.adminPasswordHash) {
    setLock({});
    sessionStorage.setItem("adm_ok", "1");
    document.getElementById("loginPanel").classList.add("hidden");
    document.getElementById("editor").classList.remove("hidden");
    loadProducts(); render();
  } else {
    const fails = (st.fails || 0) + 1;
    setLock(fails >= 5 ? { fails: 0, until: Date.now() + 5*60*1000 } : { fails });
    toast("Неверный пароль" + (fails >= 3 ? ` (попытка ${fails} из 5)` : ""));
  }
}

// смена пароля: генерирует хеш для products.js
async function changePassword() {
  const p1 = prompt("Новый пароль (минимум 8 символов):");
  if (!p1) return;
  if (p1.length < 8) { toast("Минимум 8 символов"); return; }
  const hash = await sha256(p1);
  prompt("Скопируйте строку и замените ею значение adminPasswordHash в products.js:", '"' + hash + '"');
}

// если уже входили в этой вкладке — не спрашиваем пароль повторно
window.addEventListener("DOMContentLoaded", () => {
  if (sessionStorage.getItem("adm_ok") === "1") {
    document.getElementById("loginPanel").classList.add("hidden");
    document.getElementById("editor").classList.remove("hidden");
    loadProducts(); render();
  }
});

const KEY = "shop_products_v3";
const CATS = Object.fromEntries(window.SHOP_CATEGORIES.filter(c=>c[0]!=="all"));

function loadProducts() {
  try {
    const saved = localStorage.getItem(KEY);
    products = saved ? JSON.parse(saved) : JSON.parse(JSON.stringify(window.DEFAULT_PRODUCTS));
  } catch(e) { products = JSON.parse(JSON.stringify(window.DEFAULT_PRODUCTS)); }
}

function render() {
  document.getElementById("prodList").innerHTML = products.map((p,i) => `
    <div class="prod">
      <div><label>Название</label><input value="${esc(p.name)}" onchange="upd(${i},'name',this.value)"></div>
      <div><label>Базовая цена, BYN</label><input type="number" value="${p.price}" onchange="upd(${i},'price',+this.value)"></div>
      <div><label>Старая цена</label><input type="number" value="${p.oldPrice ?? ''}" placeholder="—" onchange="upd(${i},'oldPrice',this.value?+this.value:null)"></div>
      <div><button class="btn btn-danger" style="width:100%" onclick="del(${i})">✕</button></div>
      <div style="grid-column:1/-1">
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px">
          <div><label>Категория</label>
            <select onchange="upd(${i},'cat',this.value)" style="width:100%;padding:12px;border-radius:10px;border:1px solid var(--border);background:#12141c;color:var(--text)">
              ${Object.entries(CATS).map(([k,v])=>`<option value="${k}" ${p.cat===k?'selected':''}>${v}</option>`).join("")}
            </select>
          </div>
          <div><label>Бейдж</label><input value="${esc(p.badge ?? '')}" placeholder="Хит / Новинка" onchange="upd(${i},'badge',this.value||null)"></div>
          <div><label>Состояние (для Б/У)</label><input value="${esc(p.condition ?? '')}" placeholder="Как новый" onchange="upd(${i},'condition',this.value||undefined)"></div>
          <div><label>Наличие</label>
            <select onchange="upd(${i},'stock',this.value||undefined)" style="width:100%;padding:12px;border-radius:10px;border:1px solid var(--border);background:#12141c;color:var(--text)">
              <option value="" ${!p.stock?'selected':''}>В наличии</option>
              <option value="soon" ${p.stock==='soon'?'selected':''}>Скоро в наличии</option>
              <option value="out" ${p.stock==='out'?'selected':''}>Ожидаем поставку</option>
            </select>
          </div>
          <div><label>Осталось, шт. (пусто = не показывать)</label><input type="number" value="${p.left ?? ''}" placeholder="—" onchange="upd(${i},'left',this.value?+this.value:undefined)"></div>
        </div>
        <label>Короткое описание</label>
        <input value="${esc(p.desc ?? '')}" onchange="upd(${i},'desc',this.value)">
        <label>Полное описание (в карточке товара)</label>
        <input value="${esc(p.full ?? '')}" onchange="upd(${i},'full',this.value)">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
          <div><label>Варианты памяти — формат: 256 ГБ:0, 512 ГБ:450</label>
            <input value="${esc(memToStr(p.memory))}" placeholder="пусто, если без вариантов" onchange="upd(${i},'memory',strToMem(this.value))"></div>
          <div><label>Главное фото (img/файл.jpg)</label>
            <input value="${esc(p.photo ?? '')}" placeholder="img/iphone-1.jpg" onchange="upd(${i},'photo',this.value||undefined)"></div>
        </div>
        <label>Галерея фото — через запятую (img/1.jpg, img/2.jpg, …)</label>
        <input value="${esc((p.gallery||[]).join(', '))}" placeholder="img/1.jpg, img/2.jpg" onchange="upd(${i},'gallery',this.value.split(',').map(s=>s.trim()).filter(Boolean))">
      </div>
    </div>`).join("");
}

const memToStr = m => Array.isArray(m) ? m.map(x=>x[0]+":"+x[1]).join(", ") : "";
const strToMem = s => {
  s = s.trim(); if (!s) return undefined;
  return s.split(",").map(part => {
    const i = part.lastIndexOf(":");
    return [part.slice(0,i).trim(), +part.slice(i+1).trim() || 0];
  }).filter(x=>x[0]);
};

const esc = s => String(s ?? "").replace(/"/g,"&quot;").replace(/</g,"&lt;");
function upd(i,k,v){ products[i][k]=v; }
function del(i){ if(confirm("Удалить «"+products[i].name+"»?")){ products.splice(i,1); render(); } }
function addProduct(){
  products.push({ id:Date.now(), cat:"iphone", name:"Новый товар", color:"Чёрный",
    price:1000, oldPrice:null, badge:null, gradient:["#5f6b7a","#2c3440"],
    sim:true, memory:[["128 ГБ",0],["256 ГБ",250]], desc:"", full:"", specs:[] });
  render();
}
function saveAll(){
  localStorage.setItem(KEY, JSON.stringify(products));
  toast("✅ Сохранено! Цены на сайте обновлены");
}
function resetAll(){
  if(confirm("Вернуть исходные товары и цены?")){
    localStorage.removeItem(KEY); loadProducts(); render(); toast("Сброшено");
  }
}
function downloadJS(){
  const j = o => JSON.stringify(o, null, 2);
  const content =
    "// Файл сгенерирован админ-панелью " + new Date().toLocaleString("ru-RU") + "\n" +
    "window.SHOP_CONFIG = " + j(window.SHOP_CONFIG) + ";\n\n" +
    "window.SHOP_CATEGORIES = " + j(window.SHOP_CATEGORIES) + ";\n\n" +
    "window.SIM_OPTIONS = " + j(window.SIM_OPTIONS) + ";\n" +
    "window.SIM_DEFAULT = " + j(window.SIM_DEFAULT || "eSIM + физ. SIM") + ";\n\n" +
    "window.SHOP_NEWS = " + j(window.SHOP_NEWS || []) + ";\n\n" +
    "window.CAT_BENEFITS = " + j(window.CAT_BENEFITS || {}) + ";\n\n" +
    "window.DEFAULT_PRODUCTS = " + j(products) + ";\n";
  const blob = new Blob([content], {type:"text/javascript"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob); a.download = "products.js"; a.click();
  toast("Файл скачан — замените им products.js на хостинге");
}

let tt;
function toast(m){
  const t=document.getElementById("toast"); t.textContent=m; t.classList.add("show");
  clearTimeout(tt); tt=setTimeout(()=>t.classList.remove("show"),2600);
}
</script>
</body>
</html>
